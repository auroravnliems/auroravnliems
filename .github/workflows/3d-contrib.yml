name: Generate 3D Contribution Graph

on:
  schedule:
    # Chạy mỗi ngày lúc 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:  # Cho phép chạy thủ công
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Calendar

    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        with:
          SETTING_JSON: |
            {
              "githubUserName": "auroravnliems",
              "type": "profile-night-rainbow",
              "backgroundColor": "#0D1117",
              "foregroundColor": "#58A6FF"
            }

      - name: Commit & Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update 3D contribution graph [skip ci]"
          git push
